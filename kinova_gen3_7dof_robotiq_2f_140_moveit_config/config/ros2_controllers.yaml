controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    twist_controller:
      type: picknik_twist_controller/PicknikTwistController
    # robotiq_gripper_controller removed — thesis_ee has no finger_joint
    fault_controller:
      type: picknik_reset_fault_controller/PicknikResetFaultController
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      stopped_velocity_tolerance: 0.5
      goal_time: 30.0
      joint_1: { trajectory: 5.0, goal: 1.0 }
      joint_2: { trajectory: 5.0, goal: 1.0 }
      joint_3: { trajectory: 5.0, goal: 1.0 }
      joint_4: { trajectory: 5.0, goal: 1.0 }
      joint_5: { trajectory: 5.0, goal: 1.0 }
      joint_6: { trajectory: 5.0, goal: 1.0 }
      joint_7: { trajectory: 5.0, goal: 1.0 }
twist_controller:
  ros__parameters:
    joint: tcp
    interface_names:
      - twist.linear.x
      - twist.linear.y
      - twist.linear.z
      - twist.angular.x
      - twist.angular.y
      - twist.angular.z
# robotiq_gripper_controller removed — thesis_ee has no finger_joint
