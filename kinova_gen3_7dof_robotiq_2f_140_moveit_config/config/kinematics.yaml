manipulator:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  # Increased from 0.005 s — the extra fixed link (pen_tip) and tight
  # orientation constraints need more search iterations to converge.
  kinematics_solver_timeout: 0.05
gripper:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
